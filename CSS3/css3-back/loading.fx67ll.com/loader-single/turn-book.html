<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>loading.fx67ll.com</title>
    <style type="text/css">
      .loader{
          width: 56px;
          height: 50px;
          margin: 50px auto;
          position: relative;
          perspective: 100px;
          perspective-origin: 50% 100%;
          transform-style: preserve-3d;
          transform: translateZ(-1px);
      }
      .loader .loader-inner{
          width: 50%;
          height: 100%;
          background: #fff;
          border: 3px solid #fc440f;
          position: absolute;
          right: 0;
          transform-origin: 0% 100%;
      }
      .loader .loader-inner:first-child{
          left: 0;
      }
      .loader .loader-inner hr{
          margin: 3px 3px 6px;
          border: 1px solid rgba(252,68,15, 0.9);
      }
      .loader .loader-inner.box{
          -webkit-animation: loading-1 3.6s infinite ease-in-out;
          animation: loading-1 3.6s infinite ease-in-out;
      }
      .loader .loader-inner.box-1{
          animation-delay: .2s;
      }
      .loader .loader-inner.box-2{
          animation-delay: .4s;
      }
      .loader .loader-inner.box-3{
          animation-delay: 0.6s;
      }
      .loader .loader-inner.box-4{
          animation-delay: 0.8s;
      }
      .loader .loader-inner.box-5{
          animation-delay: 1.8s;
      }
      .loader .loader-inner.box-6{
          animation-delay: 2.2s;
      }
      @-webkit-keyframes loading-1{
          25%,100%{
              transform: translateX(3px) rotateY(-180deg);
          }
      }
      @keyframes loading-1{
          25%,100%{
              transform: translateX(3px) rotateY(-180deg);
          }
      }
    </style>
  </head>
  <body>
    <div class="demo">
      <div class="loader">
        <div class="loader-inner">
          <hr />
          <hr />
          <hr />
          <hr />
          <hr />
        </div>
        <div class="loader-inner box box-1">
          <hr />
          <hr />
          <hr />
          <hr />
          <hr />
        </div>
        <div class="loader-inner box box-2">
          <hr />
          <hr />
          <hr />
          <hr />
          <hr />
        </div>
        <div class="loader-inner box box-3">
          <hr />
          <hr />
          <hr />
          <hr />
          <hr />
        </div>
        <div class="loader-inner box box-4">
          <hr />
          <hr />
          <hr />
          <hr />
          <hr />
        </div>
        <div class="loader-inner box box-5">
          <hr />
          <hr />
          <hr />
          <hr />
          <hr />
        </div>
        <div class="loader-inner box box-6">
          <hr />
          <hr />
          <hr />
          <hr />
          <hr />
        </div>
        <div class="loader-inner">
          <hr />
          <hr />
          <hr />
          <hr />
          <hr />
        </div>
      </div>
    </div>
  </body>
</html>
